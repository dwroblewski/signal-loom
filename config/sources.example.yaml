# signal-loom sources — v1 supported types: rss, youtube, listing
# Each key is an internal slug; name: overrides the display name.
# ── Replace everything above with YOUR domain. Example (climate): ──
# (see commented-out block at the bottom of this file)

simon_willison:
  name: Simon Willison's Weblog
  type: rss
  feed_url: https://simonw.substack.com/feed
  output_dir: content/simon-willison
  tags:
    - ai
    - engineering
    - llm
  perspective: practitioner
  scrape_limit: 10
  scrape_full_content: false
  fetch_method: auto
  enabled: true

import_ai_filtered:
  name: Import AI (LLM filter)
  type: rss
  feed_url: https://importai.substack.com/feed
  output_dir: content/import-ai
  tags:
    - ai
    - research
  perspective: researcher
  scrape_limit: 8
  scrape_full_content: false
  fetch_method: auto
  keyword_filter:
    mode: any
    include:
      - large language model
      - reinforcement learning
  enabled: true

latent_space_yt:
  name: Latent Space (YouTube)
  type: youtube
  feed_url: https://www.youtube.com/@LatentSpacePod
  output_dir: content/latent-space-yt
  tags:
    - ai
    - podcast
    - video
  perspective: practitioner
  scrape_limit: 5
  scrape_full_content: false
  fetch_method: auto
  enabled: true

ai_daily_brief_listing:
  name: AI Daily Brief (episode listing)
  type: listing
  feed_url: https://www.aidailybriefing.com/episodes/
  output_dir: content/ai-daily-brief
  tags:
    - ai
    - news
  perspective: journalist
  scrape_limit: 10
  scrape_full_content: false
  # fetch_method controls how the index page is fetched:
  #   auto    — try direct httpx first; fall back to browser if page is empty (default)
  #   browser — always use Playwright (requires: uv sync --extra browser)
  #   auto-no-browser — direct httpx only, no browser fallback
  fetch_method: browser
  # listing_link_pattern: 'href="(/episodes/[a-zA-Z0-9_-]+)"'  # optional: override broad default
  # enable after: uv sync --extra browser (or if the index page is static HTML, set fetch_method: auto)
  enabled: false

# ── Academic / research feeds work through the `rss` type — no new setup. ──
# arXiv exposes per-category RSS and an Atom API; the abstract becomes the article
# body, authors + subject categories (cs.AI, cs.LG, …) come through for enrichment.
# bioRxiv/medRxiv, PubMed, and most journal "latest articles" RSS work the same way.
# Uncomment to enable. (A query-driven `academic` source type — OpenAlex-backed,
# 250M works, no key — is on the v1.1 roadmap for richer structured ingestion.)
#
# arxiv_cs_ai:
#   name: arXiv cs.AI (new submissions)
#   type: rss
#   feed_url: https://rss.arxiv.org/rss/cs.AI          # categories: https://arxiv.org/category_taxonomy
#   # OR query-driven via the Atom API (keyword/author/category control):
#   # feed_url: "http://export.arxiv.org/api/query?search_query=cat:cs.AI&sortBy=submittedDate&sortOrder=descending&max_results=15"
#   output_dir: content/arxiv-cs-ai
#   tags: [arxiv, research]
#   perspective: researcher
#   scrape_limit: 15
#   keyword_filter: { mode: any, include: [agent, evaluation, benchmark] }   # optional pre-filter
#   enabled: true

