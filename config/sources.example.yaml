# ── Example domain: investment research (sell-side/buy-side desks) ──────────
# All feeds below were verified live. Pair with a topics.yaml in desk language —
# the controlled vocab is what clusters papers into a usable read. Suggested:
#   # systematic / quant
#   - factor premia
#   - cross-sectional equity signals
#   - statistical arbitrage
#   - market microstructure
#   - execution and transaction costs
#   - volatility surface and options
#   - derivatives pricing
#   - regime and time-series modeling
#   - machine learning signals
#   - alternative data
#   # macro / discretionary / fundamental
#   - monetary policy and the path of rates
#   - inflation and the yield curve
#   - credit and spreads
#   - financial stability and systemic risk
#   - global macro and FX
#   - growth and the business cycle
#   - valuation and capital allocation
#   - earnings quality and fundamentals
# and entity-aliases.yaml, e.g.:  Federal Reserve: Fed ; European Central Bank: ECB
#
# ---- For QUANTS (methods, microstructure, pricing, risk) ----
# arxiv q-fin taxonomy: PM=portfolio, TR=trading/microstructure, RM=risk, PR=pricing,
#   CP=computational, ST=statistical, MF=mathematical, GN=general, EC=economics.
